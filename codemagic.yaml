workflows:
  alabli-ios-ipa:
    name: العبلي iOS IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: ly.alabli.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install Capacitor dependencies
        script: |
          cd arenaly/apps/alabli-ios-build
          npm ci || npm install
      - name: Prepare iOS project
        script: |
          cd arenaly/apps/alabli-ios-build
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi
          npx capacitor-assets generate --ios
          npx cap sync ios
          cd ios/App
          pod install
      - name: Apply Codemagic signing profiles
        script: |
          cd arenaly/apps/alabli-ios-build
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          cd arenaly/apps/alabli-ios-build
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - arenaly/apps/alabli-ios-build/**/*.ipa
      - arenaly/apps/alabli-ios-build/ios/App/build/**/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
