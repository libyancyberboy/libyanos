workflows:
  alabli-ios-ipa:
    name: Alabli iOS IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: ly.alabli.app
      vars:
        PROJECT_DIR: "apps/alabli-ios-build"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Verify Alabli project
        script: |
          test -f "$PROJECT_DIR/package.json" || {
            echo "Alabli iOS project was not found at $PROJECT_DIR"
            echo "Make sure Codemagic is using codemagic.yaml from the ArenaLY folder."
            find . -maxdepth 3 -type f | sort | head -120
            exit 1
          }
      - name: Install Capacitor dependencies
        script: |
          cd "$PROJECT_DIR"
          npm ci || npm install
      - name: Prepare iOS project
        script: |
          cd "$PROJECT_DIR"
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi
          npx capacitor-assets generate --ios
          npx cap sync ios
          cd ios/App
          pod install
      - name: Apply Codemagic signing profiles
        script: |
          cd "$PROJECT_DIR"
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          cd "$PROJECT_DIR"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - "**/*.ipa"
      - "apps/alabli-ios-build/ios/App/build/**/*.xcarchive"
      - "/tmp/xcodebuild_logs/*.log"

